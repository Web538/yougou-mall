<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>优购商城 - 您的一站式购物平台</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="header">
    <div class="container header-inner">
      <div class="logo" onclick="navigate('home')">
        <span class="logo-icon">🛒</span>
        <span class="logo-text">优购商城</span>
      </div>

      <div class="search-box">
        <input type="text" id="searchInput" placeholder="搜索商品名称、品牌...">
        <button onclick="handleSearch()">🔍</button>
      </div>

      <nav class="nav-menu">
        <a onclick="navigate('home')" class="nav-link">首页</a>
        <a onclick="navigate('cart')" class="nav-link cart-link">
          🛍️ 购物车 <span id="cartBadge" class="badge">0</span>
        </a>
        <a onclick="navigate('orders')" class="nav-link">📦 我的订单</a>
        
        <!-- 未登录状态 -->
        <a id="navLoginBtn" onclick="showAuthModal('login')" class="nav-link nav-auth">登录</a>
        <a id="navRegisterBtn" onclick="showAuthModal('register')" class="nav-link nav-auth">注册</a>
        
        <!-- 已登录状态 -->
        <div id="navUserMenu" class="nav-user-menu" style="display:none;">
          <a class="nav-link nav-user" onclick="toggleUserDropdown()">
            👤 <span id="navUsername"></span> ▾
          </a>
          <div id="userDropdown" class="user-dropdown">
            <a onclick="navigate('profile'); closeUserDropdown();">👤 个人中心</a>
            <a onclick="navigate('orders'); closeUserDropdown();">📦 我的订单</a>
            <a onclick="handleLogout();" class="logout-item">🚪 退出登录</a>
          </div>
        </div>
      </nav>
    </div>

    <div class="category-bar">
      <div class="container">
        <div id="categoryList" class="category-list"></div>
      </div>
    </div>
  </header>

  <main class="main container">
    <!-- 首页 -->
    <div id="view-home" class="view active">
      <section class="hero">
        <div class="hero-content">
          <h1>发现好物 · 享受购物</h1>
          <p>精选全球优质商品，品质保障，极速发货</p>
          <div class="hero-stats">
            <div><strong>10000+</strong><span>精选商品</span></div>
            <div><strong>50万+</strong><span>用户信赖</span></div>
            <div><strong>24h</strong><span>极速发货</span></div>
          </div>
        </div>
      </section>

      <section class="section">
        <div class="section-header">
          <h2 id="sectionTitle">🔥 热门推荐</h2>
          <div class="sort-options">
            <label>排序：</label>
            <select id="sortSelect" onchange="renderProducts()">
              <option value="default">默认推荐</option>
              <option value="price-asc">价格从低到高</option>
              <option value="price-desc">价格从高到低</option>
              <option value="sales">销量优先</option>
              <option value="rating">评分优先</option>
            </select>
          </div>
        </div>
        <div id="productGrid" class="product-grid"></div>
      </section>
    </div>

    <!-- 商品详情 -->
    <div id="view-product" class="view">
      <button class="back-btn" onclick="navigate('home')">← 返回商品列表</button>
      <div id="productDetail" class="product-detail"></div>
    </div>

    <!-- 购物车 -->
    <div id="view-cart" class="view">
      <h2>🛍️ 我的购物车</h2>
      <div id="cartContent" class="cart-content"></div>
    </div>

    <!-- 结算页 -->
    <div id="view-checkout" class="view">
      <button class="back-btn" onclick="navigate('cart')">← 返回购物车</button>
      <h2>💳 订单结算</h2>
      <div id="checkoutContent" class="checkout-content"></div>
    </div>

    <!-- 订单列表 -->
    <div id="view-orders" class="view">
      <h2>📦 我的订单</h2>
      <div id="ordersContent" class="orders-content"></div>
    </div>

    <!-- 个人中心 -->
    <div id="view-profile" class="view">
      <button class="back-btn" onclick="navigate('home')">← 返回首页</button>
      <div class="profile-container">
        <div class="profile-sidebar">
          <div class="profile-avatar">👤</div>
          <div class="profile-username" id="profileUsername"></div>
          <div class="profile-email" id="profileEmail"></div>
          <nav class="profile-nav">
            <a onclick="showProfileTab('info')" class="active" id="tabInfo">个人信息</a>
            <a onclick="showProfileTab('password')" id="tabPassword">修改密码</a>
          </nav>
        </div>
        <div class="profile-main">
          <!-- 基本信息表单 -->
          <div id="profileInfoTab" class="profile-tab">
            <h3>基本信息</h3>
            <form id="profileForm">
              <div class="form-group">
                <label>用户名</label>
                <input type="text" id="profileInputUsername" disabled>
              </div>
              <div class="form-group">
                <label>邮箱</label>
                <input type="email" id="profileInputEmail" disabled>
              </div>
              <div class="form-group">
                <label>手机号</label>
                <input type="tel" id="profileInputPhone" placeholder="请输入手机号">
              </div>
              <button type="submit" class="btn-primary">保存修改</button>
            </form>
          </div>
          
          <!-- 修改密码表单 -->
          <div id="profilePasswordTab" class="profile-tab" style="display:none;">
            <h3>修改密码</h3>
            <form id="passwordForm">
              <div class="form-group">
                <label>旧密码</label>
                <input type="password" id="oldPassword" required>
              </div>
              <div class="form-group">
                <label>新密码</label>
                <input type="password" id="newPassword" required minlength="6">
              </div>
              <div class="form-group">
                <label>确认新密码</label>
                <input type="password" id="confirmPassword" required>
              </div>
              <button type="submit" class="btn-primary">修改密码</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <p>© 2026 优购商城 - 您的一站式购物平台</p>
    </div>
  </footer>

  <!-- Toast 提示 -->
  <div id="toast" class="toast"></div>

  <!-- 登录/注册弹窗 -->
  <div id="authModal" class="modal">
    <div class="modal-overlay" onclick="closeAuthModal()"></div>
    <div class="modal-content auth-modal">
      <button class="modal-close" onclick="closeAuthModal()">×</button>
      
      <!-- 登录表单 -->
      <div id="loginForm" class="auth-form">
        <h2>登录</h2>
        <form onsubmit="handleLogin(event)">
          <div class="form-group">
            <label>用户名 / 邮箱</label>
            <input type="text" id="loginUsername" required placeholder="请输入用户名或邮箱">
          </div>
          <div class="form-group">
            <label>密码</label>
            <input type="password" id="loginPassword" required placeholder="请输入密码">
          </div>
          <button type="submit" class="btn-primary btn-block">登录</button>
        </form>
        <p class="auth-switch">
          还没有账号？<a onclick="switchAuthForm('register')">立即注册</a>
        </p>
      </div>
      
      <!-- 注册表单 -->
      <div id="registerForm" class="auth-form" style="display:none;">
        <h2>注册</h2>
        <form onsubmit="handleRegister(event)">
          <div class="form-group">
            <label>用户名</label>
            <input type="text" id="regUsername" required placeholder="3-20个字符" minlength="3" maxlength="20">
          </div>
          <div class="form-group">
            <label>邮箱</label>
            <input type="email" id="regEmail" required placeholder="请输入有效邮箱">
          </div>
          <div class="form-group">
            <label>手机号（选填）</label>
            <input type="tel" id="regPhone" placeholder="选填">
          </div>
          <div class="form-group">
            <label>密码</label>
            <input type="password" id="regPassword" required placeholder="至少6个字符" minlength="6">
          </div>
          <button type="submit" class="btn-primary btn-block">注册</button>
        </form>
        <p class="auth-switch">
          已有账号？<a onclick="switchAuthForm('login')">立即登录</a>
        </p>
      </div>
    </div>
  </div>

  <script src="src/api.js"></script>
  <script src="src/store.js"></script>
  <script src="app.js"></script>
</body>
</html>
